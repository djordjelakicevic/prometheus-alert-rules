groups:
- name: aerospike.rules
  rules:

  - alert: AerospikeExporterDown
    expr:  up{job=~"aerospike-dev|aerospike-prod"} == 0
    for: 30s
    labels:
      grouping_label: '{{ $labels.instance }}'
      type: aerospike
      severity: critical
    annotations:
      summary: "Instance {{ $labels.instance }} of job {{$labels.job}} is down"
      resolved_summary: "Instance is up."
      dashboard: "grafana_dashboard_url"

  - alert: AerospikeNodeDown
    expr: aerospike_node_up == 0
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Node {{ $labels.instance }} down"
      description: "{{ $labels.instance }} node is down."
      resolved_summary: "Node is back up"

  - alert: AerospikeBackupServiceDown
    expr:  up{job="aerospike-backup-service-dev"} == 0
    for: 30s
    labels:
      grouping_label: '{{ $labels.instance }}'
      type: aerospike
      severity: critical
    annotations:
      summary: "Aerospike Backup Service on {{ $labels.instance }} of job {{$labels.job}} is down"
      resolved_summary: "ABS is up."

  - alert: ABSBackupTooOld
    expr: time() - max(aerospike_backup_service_last_successful_backup_timestamp) > 86400
    labels:
      grouping_label: '{{ $labels.instance }}'
      type: aerospike
      severity: critical
    annotations:
      summary: "Last successfull backup is older than 24 hours"

  - alert: ABSBackupJobFailureDetected
    expr: increase(aerospike_backup_service_backup_events_total{outcome="failure"}[2m]) > 0
    labels:
      grouping_label: '{{ $labels.instance }}'
      type: aerospike
      severity: warning
    annotations:
      summary: "Backup job failure detected: {{ $labels.type }}"
      description: "At least one backup job has failed in the last 2 minutes."

- name: aerospike_aerospike.rules > NAMESPACE
  rules:
  - alert: AerospikeNamespaceStopWrites
    expr: aerospike_namespace_stop_writes == 1
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Stop writes for {{ $labels.instance }}/{{ $labels.ns }}"
      description: "Used disk space for namespace {{ $labels.ns }} in node {{ $labels.instance }} is above stop writes limit."
      resolved_summary: "Writes are enabled"

  - alert: AerospikeIndexStageSizeWarn
    # Check here: https://docs.aerospike.com/reference/configuration#index-stage-size
    #  <128mb or >4gb -- send warn alert
    expr:  (aerospike_namespace_index_stage_size>4000000000)  
    for: 1m
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Index stage size configuration is not configured according to documentation in {{ $labels.instance  }}/{{ $labels.ns }}"
      description: "Index stage size configuration is not configured according to documentation in {{ $labels.ns }} in node {{ $labels.instance }}. "
      resolved_summary: "Index stage size is configured properly"

  - alert: AerospikeSIndexStageSizeWarn
    # Check here: https://docs.aerospike.com/reference/configuration#sindex-stage-size
    #  <128mb or >4gb -- send warn alert
    expr:  (aerospike_namespace_sindex_stage_size>4000000000)  
    for: 1m
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "SIndex stage size configuration is not configured according to documentation in {{ $labels.instance }}/{{ $labels.ns }}"
      description: "SIndex stage size configuration is not configured according to documentation in {{ $labels.ns }} in node {{ $labels.instance }}. "
      resolved_summary: "SIndex stage size is configured properly"

  - alert: AerospikeActiveProxies
    expr: (increase(aerospike_namespace_client_proxy_complete[2m]) + increase(aerospike_namespace_client_proxy_timeout[2m]) + increase(aerospike_namespace_client_proxy_error[2m]) + increase(aerospike_namespace_batch_sub_proxy_complete[2m]) + increase(aerospike_namespace_batch_sub_proxy_timeout[2m]) + increase(aerospike_namespace_batch_sub_proxy_error[2m])) > 0
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Node is doing proxy. Proxies can happen during cluster change / migrations or if there are any network issues."
      description: "Active proxies detected for {{ $labels.ns }} on node {{ $labels.instance }}"
      resolved_summary: "No active proxies"

  - alert: AerospikeNamespaceSupervisorFallingBehind
    expr: aerospike_namespace_objects>0 and aerospike_namespace_nsup_cycle_deleted_pct > 15
    for: 2m
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "NSUP is falling behind and/or display the length of time the most recent NSUP cycle lasted"
      description: "There seems some lag falling behind and/or display the length of time the most recent NSUP cycle lasted {{ $labels.ns }} in node {{ $labels.instance }}. NSUP cycle deleted percentage is greater than 15%."
      resolved_summary: "NSUP is on schedule"

  - alert: AerospikeHwmBreached
    expr: aerospike_namespace_hwm_breached == 1
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "High water mark breached for {{ $labels.instance }}/{{ $labels.ns }}"
      description: "high-water-disk-pct or high-water-memory-pct has been breached for namespace {{ $labels.ns }} in node {{ $labels.instance }}. Eviction may start to recover disk space."
      resolved_summary: "High water mark is normal"

  - alert: AerospikeClientTimeouts
    expr: rate(aerospike_namespace_client_read_timeout[1m]) > 1 or rate(aerospike_namespace_client_write_timeout[1m]) > 1 or rate(aerospike_namespace_client_tsvc_timeout[1m]) > 1
    for: 1m
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Client transactions are timing out"
      description: "Client connections timing out at a rate greater than 1/s. Timeouts can occur during network issues or resource contention on the client and/or server nodes."
      resolved_summary: "Client timeouts have stopped"

  - alert: AerospikeDeviceWriteQWarning
    expr: aerospike_namespace_storage_engine_device_write_q > 1
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Device write queue high for {{ $labels.instance }}/{{ $labels.ns }}/{{ $labels.device_index }}"
      description: "Device write queue is greater than 1 for namespace {{ $labels.ns }} on device {{ $labels.device_index }} in node {{ $labels.instance }}. May indicate underperforming storage subsystem or hotkeys."
      resolved_summary: "Write queue is normal"

  - alert: AerospikeDeviceDefragQWarning
    expr: aerospike_namespace_storage_engine_device_defrag_q> 1000
    for: 5m
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Device defrag queue high for {{ $labels.instance }}/{{ $labels.ns }}/{{ $labels.device_index }}"
      description: "Device defrag queue has been above 1000 for more than 5m for namespace {{ $labels.ns }} on device {{ $labels.device_index }} in node {{ $labels.instance }}. May indicate underperforming storage subsystem or hotkeys."
      resolved_summary: "Defrag queue is normal"

  - alert: AerospikeClockSkewStopWrites
    expr: aerospike_namespace_clock_skew_stop_writes == 1
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Clock skew stop writes"
      description: "Clock has skewed for namespace {{ $labels.ns }} in node {{ $labels.instance }}"
      resolved_summary: "Clock skew resolved"

  - alert: AerospikeUnavailablePartitions
    expr: aerospike_namespace_unavailable_partitions > 0
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Some partitions are inaccessible, and roster nodes are missing from the cluster."
      description: "Some partitions are not available for namespace {{ $labels.ns }} on node {{ $labels.instance }}. Check for network issues and make sure the cluster forms properly."
      resolved_summary: "All partitions are available"

  - alert: AerospikeDeadPartitions
    expr: aerospike_namespace_dead_partitions > 2
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "There are unavailable partition, but all roster nodes are present in the cluster."
      description: "Some partitions are dead for namespace {{ $labels.ns }} on node {{ $labels.instance }}. Greater than replication-factor number nodes had an unclean shutdown, and there may be data loss. Will require the use of the revive command to make the partitions available again."
      resolved_summary: "Dead partitions recovered"
  
  - alert: AerospikeNamespaceDataCloseToStopWrites
    expr: (aerospike_namespace_data_avail_pct - aerospike_namespace_storage_engine_stop_writes_avail_pct) <= 25
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Close to stop writes for {{ $labels.instance }}/{{ $labels.ns }} due to data_avail_pct"
      description: "data_avail_pct for namespace {{ $labels.ns }} in node {{ $labels.instance }} is close to stop-writes-avail-pct limit."
      resolved_summary: "Data availability is sufficient"
  
  - alert: AerospikeNamespaceHighDataUseCritical
    expr: aerospike_namespace_data_used_pct > 75
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Data utilization critically high for {{ $labels.instance }}/{{ $labels.ns }}"
      description: "Data used has crossed above 75% for namespace {{ $labels.ns }} in node {{ $labels.instance }}. May indicate a need to reduce the object count or increase capacity."
      resolved_summary: "Data utilization is normal"

- name: aerospike_aerospike.rules > NODE
  rules:

  # - alert: AerospikeBestPracticesFailure
  #   expr: aerospike_node_stats_failed_best_practices > 0
  #   for: 30s
  #   labels:
  #     severity: warning
  #     grouping_label: '{{ $labels.hostname }}'
  #     type: aerospike
  #   annotations:
  #     summary: " Best Practices check failed on {{ $labels.instance }} in cluster {{ $labels.cluster_name }}"
  #     resolved_summary: "Best practices check passed"

  - alert: AerospikeClientConnectionsWarning
    expr: aerospike_node_stats_client_connections > 5000
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Client connections warning"
      description: "Client connections are greater than 5000. Connections will fail if they exceed proto-fd-max."
      resolved_summary: "Client connections are normal"

  - alert: AerospikeClientConnectionsCritical
    expr: aerospike_node_stats_client_connections > 10000
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Client connections critical"
      description: "Client connections are greater than 10000."
      resolved_summary: "Client connections are normal"

  - alert: AerospikeClientConnectionChurn
    expr: rate(aerospike_node_stats_client_connections_opened[1m]) > 100 or rate(aerospike_node_stats_client_connections_closed[1m]) > 100
    for: 1m
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Clients are churning connections at a high rate"
      description: "Client connections are being opened or closed at a rate greater than 100/s. Connection churn can increase latency and client timeouts which in turn cause the client to open more connections."
      resolved_summary: "Connection churn is normal"

  - alert: AerospikeClockSkewWarning
    expr: aerospike_node_stats_cluster_clock_skew_ms > 2000
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Cluster clock skew warning"
      description: "Clock skew between nodes has exceeded 2 seconds. Fix NTP/chrony synchronization to prevent potential issues with TTL and replication."
      resolved_summary: "Clock skew is normal"

  - alert: AerospikeClockSkewCritical
    expr: aerospike_node_stats_cluster_clock_skew_ms > 20000
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Cluster clock skew critical alert"
      description: "Clock skew between nodes has exceeded 20 seconds. Large clock skew can cause NSUP issues, TTL problems, and may trigger stop-writes. Fix time synchronization immediately!"
      resolved_summary: "Clock skew is normal"

  - alert: AerospikeNodeLowRamMemoryCritical
    expr: aerospike_node_stats_system_free_mem_pct < 25
    for: 30s
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "RAM Memory available critically low for {{ $labels.instance }}"
      description: "Total RAM memory free has dropped below 25% for node {{ $labels.instance }}."
      resolved_summary: "Memory is sufficient"

  - alert: AerospikeHeapEfficiencyWarning
    #expr: aerospike_node_stats_heap_efficiency_pct{job="aerospike" } < 60
    expr: (100 - aerospike_node_stats_system_free_mem_pct) > 70 and aerospike_node_stats_heap_efficiency_pct < 60
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Heap efficiency warning for {{ $labels.instance }}"
      description: "Heap efficiency for node for {{ $labels.instance }} has dropped below 60%."
      resolved_summary: "Heap efficiency is normal"

  - alert: AerospikeRwInProgressWarning
    expr: aerospike_node_stats_rw_in_progress> 100
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Read/write queue too high for {{ $labels.instance }}/{{ $labels.ns }}/{{ $labels.device_index }}"
      description: "Read/write queue is greater than 100 for namespace {{ $labels.ns }} on device {{ $labels.device_index }} in node {{ $labels.instance }}. May indicate underperforming storage subsystem or hotkeys."
      resolved_summary: "Read/write queue is normal"

  - alert: AerospikeDetailLogEnabled
    expr: sum by (job, cluster_name, service, env) (aerospike_node_stats_pseudo_log_detail) > 0
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "DETAIL Log level is ENABLED in node {{ $labels.service }} "
      description: "DETAIL Log level is ENABLED in node {{ $labels.service }} "
      resolved_summary: "DETAIL log level disabled"

  - alert: AerospikeDebugLogEnabled
    expr: sum by (job, cluster_name, service, env) (aerospike_node_stats_pseudo_log_debug) > 0
    labels:
      severity: critical
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "DEBUG Log level is ENABLED in node {{ $labels.service }} "
      description: "DEBUG Log level is ENABLED in node {{ $labels.service }} "
      resolved_summary: "DEBUG log level disabled"

- name: aerospike_aerospike.rules > SET
  rules:
  
  - alert: AerospikeNamespaceSetQuotaWarning
    expr: (((aerospike_sets_data_used_bytes ) / (aerospike_sets_stop_writes_size != 0)) * 100) > 85
    for: 30s
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      description: "Nearing memory quota for {{ $labels.set }} in namespace {{ $labels.ns }} in node {{ $labels.instance }}."
      summary: 'One of your nodes is at {{ printf "%.0f" $value }}% of the quota you have configured on the set.'
      resolved_summary: "Set quota is normal"
            
- name: aerospike_aerospike.rules > LATENCIES
  rules:
  - alert: AerospikeReadLatencyP95Warning
    expr: histogram_quantile(0.95, rate(aerospike_latencies_read_ms_bucket[5m])) > 10
    for: 5m
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Read latency breached for {{ $labels.ns }} on {{ $labels.instance }}"
      description: "95th percentile read latency breached 5ms for namespace {{ $labels.ns }} on host {{ $labels.instance }}."
      resolved_summary: "Read latency is normal"

  - alert: AerospikeWriteLatencyP95Warning
    expr: histogram_quantile(0.95, rate(aerospike_latencies_write_ms_bucket[5m])) > 5
    for: 5m
    labels:
      severity: warning
      grouping_label: '{{ $labels.hostname }}'
      type: aerospike
    annotations:
      summary: "Write latency breached for {{ $labels.ns }} on {{ $labels.instance }}"
      description: "95th percentile write latency breached 4ms for namespace {{ $labels.ns }} on host {{ $labels.instance }}."
      resolved_summary: "Write latency is normal"
