groups:
- name: thanos query
  rules:
  - alert: ThanosQueryHttpRequestQueryErrorRateHigh
    expr: (
      sum by (job) (rate(http_requests_total{code=~"5..", job="thanos-query", handler="query"}[5m]))
      /
      sum by (job) (rate(http_requests_total{job="thanos-query", handler="query"}[5m]))
      ) * 100 > 5
    for: 5m
    labels:
      grouping_label: "{{ $labels.job }}"
      severity: critical
    annotations:
      summary: Thanos Query {{$labels.job}} is failing to handle {{$value | humanize}}% of "query" requests.
      resolved_summary: Thanos Query {{$labels.job}} query error rate is back to normal.
      
  - alert: ThanosQueryHttpRequestQueryRangeErrorRateHigh
    expr: (
      sum by (job) (rate(http_requests_total{code=~"5..", job="thanos-query", handler="query_range"}[5m]))
      /
      sum by (job) (rate(http_requests_total{job="thanos-query", handler="query_range"}[5m]))
      ) * 100 > 5
    for: 5m
    labels:
      grouping_label: "{{ $labels.job }}"
      severity: critical
    annotations:
      summary: Thanos Query {{$labels.job}} is failing to handle {{$value | humanize}}% of "query_range" requests.
      resolved_summary: Thanos Query {{$labels.job}} query_range error rate is back to normal.

  - alert: ThanosQueryGrpcServerErrorRate
    expr: (
      sum by (job) (rate(grpc_server_handled_total{grpc_code=~"Unknown|ResourceExhausted|Internal|Unavailable|DataLoss|DeadlineExceeded", job=~"thanos-query"}[5m]))
      /
      sum by (job) (rate(grpc_server_started_total{job="thanos-query"}[5m]))
      ) * 100 > 5
    for: 5m
    labels:
      grouping_label: "{{ $labels.job }}"
      severity: warning
    annotations:
      summary: Thanos Query {{$labels.job}} is failing to handle {{$value | humanize}}% of requests.
      resolved_summary: Thanos Query {{$labels.job}} grpc server error rate is back to normal.

  - alert: ThanosQueryGrpcClientErrorRate
    expr: (
      sum by (job) (rate(grpc_client_handled_total{grpc_code!="OK", job="thanos-query"}[5m]))
      /
      sum by (job) (rate(grpc_client_started_total{job="thanos-query"}[5m]))
      ) * 100 > 5
    for: 5m
    labels:
      grouping_label: "{{ $labels.job }}"
      severity: warning
    annotations:
      summary: Thanos Query {{$labels.job}} is failing to send {{$value | humanize}}% of requests.
      resolved_summary: Thanos Query {{$labels.job}} grpc client error rate is back to normal.

  - alert: ThanosQueryInstantLatencyHigh
    expr: (
      histogram_quantile(0.99, sum by (job, le) (rate(http_request_duration_seconds_bucket{job="thanos-query", handler="query"}[5m]))) > 40
      and
      sum by (job) (rate(http_request_duration_seconds_bucket{job="thanos-query", handler="query"}[5m])) > 0
      )
    for: 10m
    labels:
      grouping_label: "{{ $labels.job }}"
      severity: critical
    annotations:
      summary: Thanos Query {{$labels.job}} has a 99th percentile latency of {{$value}} seconds for instant queries.
      resolved_summary: Thanos Query {{$labels.job}} instant query latency is back to normal.

  - alert: ThanosQueryRangeLatencyHigh
    expr: (
      histogram_quantile(0.99, sum by (job, le) (rate(http_request_duration_seconds_bucket{job="thanos-query", handler="query_range"}[5m]))) > 90
      and
      sum by (job) (rate(http_request_duration_seconds_count{job="thanos-query", handler="query_range"}[5m])) > 0
      )
    for: 10m
    labels:
      grouping_label: '{{ $labels.job }}'
      severity: critical
    annotations:
      summary: Thanos Query {{$labels.job}} has a 99th percentile latency of {{$value}} seconds for range queries.
      resolved_summary: Thanos Query {{$labels.job}} range query latency is back to normal.

